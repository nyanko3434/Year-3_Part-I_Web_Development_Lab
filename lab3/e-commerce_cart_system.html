<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shopping Cart</title>
  <style>
    table { border-collapse: collapse; margin-top: 12px; width: 100%; }
    th, td { border: 1px solid #999; padding: 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>Simple E-Commerce Cart</h1>
 
  <h2>Products</h2>
  <div id="productList"></div>
 
  <h2>Cart</h2>
  <table>
    <thead>
      <tr>
        <th>Product</th><th>Price</th><th>Qty</th><th>Subtotal</th><th>Action</th>
      </tr>
    </thead>
    <tbody id="cartBody"></tbody>
  </table>
  <p><strong>Total: $<span id="total">0.00</span></strong></p>
 
  <script>
    // Products stored as array of objects
    const products = [
      { id: 1, name: 'Keyboard', price: 29.99 },
      { id: 2, name: 'Mouse',    price: 19.99 },
      { id: 3, name: 'Monitor',  price: 149.99 },
      { id: 4, name: 'Headset',  price: 49.99 }
    ];
 
    let cart = [];
 
    // Render product buttons
    function renderProducts() {
      const div = document.getElementById('productList');
      div.innerHTML = '';
      products.forEach(function(p) {
        const btn = document.createElement('button');
        btn.textContent = p.name + ' - $' + p.price.toFixed(2) + '  [Add to Cart]';
        btn.onclick = function() { addToCart(p.id); };
        div.appendChild(btn);
        div.appendChild(document.createElement('br'));
      });
    }
 
    function addToCart(id) {
      const product = products.find(function(p) { return p.id === id; });
      const existing = cart.find(function(c) { return c.id === id; });
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ id: product.id, name: product.name, price: product.price, qty: 1 });
      }
      renderCart();
    }
 
    function removeFromCart(id) {
      cart = cart.filter(function(c) { return c.id !== id; });
      renderCart();
    }
 
    function changeQty(id, delta) {
      const item = cart.find(function(c) { return c.id === id; });
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) removeFromCart(id);
      else renderCart();
    }
 
    function renderCart() {
      const tbody = document.getElementById('cartBody');
      tbody.innerHTML = '';
      let total = 0;
 
      cart.forEach(function(item) {
        const subtotal = item.price * item.qty;
        total += subtotal;
        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + item.name + '</td>' +
          '<td>$' + item.price.toFixed(2) + '</td>' +
          '<td>' +
            '<button onclick="changeQty(' + item.id + ', -1)">-</button> ' +
            item.qty +
            ' <button onclick="changeQty(' + item.id + ', 1)">+</button>' +
          '</td>' +
          '<td>$' + subtotal.toFixed(2) + '</td>' +
          '<td><button onclick="removeFromCart(' + item.id + ')">Remove</button></td>';
        tbody.appendChild(tr);
      });
 
      document.getElementById('total').textContent = total.toFixed(2);
    }
 
    renderProducts();
  </script>
</body>
</html>
