{% load static %}
<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API App Index</title>
    <script src="/static/jquery-4.0.0.min.js"></script> <!-- jQuery not working -->
</head>
<body>
    <div id="productID"></div>
    <script>
        let divID = $("#productID");
        console.log(divID);
        $.ajax({
            url: "/api/products/list/",
            type: "GET",
            dataType: "json",
            success: function(data) {
                console.log(data);
                data.forEach(function(product) {
                    divID.append("<p>" + product.name + " - $" + product.price + "</p>");
                });
            },
            error: function(xhr, status, error) {
                console.error("Error fetching products:", error);
            }
        });
    </script>
</body>
</html>
